                    - img [ref=e457]
                - paragraph [ref=e459]:
                  - text: Claude Code skills are
                  - strong [ref=e460]: static
                  - text: . You write them once, and they stay exactly as they are — even when they fail, produce subpar output, or encounter new edge cases. There's no feedback loop, no way to know which skills are working well, and no mechanism to improve them over time.
                - paragraph [ref=e461]: You end up with a growing pile of skills where some work great, some are mediocre, and some are silently broken. The only way to fix them is manual review.
                - generic [ref=e462]:
